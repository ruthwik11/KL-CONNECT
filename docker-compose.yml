version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: klconnect-postgres
    restart: always
    environment:
      POSTGRES_USER: klconnect
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: klconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: klconnect-redis
    restart: always
    command: redis-server --requirepass redispassword123
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
